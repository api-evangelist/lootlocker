apis:
- aid: lootlocker:game-api
  name: LootLocker Game API
  description: 'The Game API is the primary client-side interface integrated into
    game builds for communication between the game and the LootLocker backend. It
    handles player session management, inventory, characters, assets, leaderboards,
    progressions, persistent storage, player files, purchasing, missions, and collectibles.
    All requests are authenticated via a session_token returned at login and passed
    in the x-session-token header.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://ref.lootlocker.com/game-api/
  baseURL: https://api.lootlocker.io/game
