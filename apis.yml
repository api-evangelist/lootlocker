  - type: Reference
    url: https://ref.lootlocker.com/server-api/
- aid: lootlocker:admin-api
  name: LootLocker Admin API
  description: 'The Admin API provides direct programmatic access to LootLocker''s
    platform management features, enabling game editor integrations and tooling that
    interact with backend configuration. It is used for managing game settings, player
    data, and platform resources outside of the in-game runtime context.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
