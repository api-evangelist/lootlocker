aid: lootlocker
name: LootLocker
description: 'LootLocker is a game backend-as-a-service platform that provides a REST
  API for building cross-platform game features without managing server infrastructure.
  The platform covers player authentication across Steam, Epic Games, PlayStation,
  Xbox, Nintendo Switch, Apple, Google, and custom white-label flows, as well as leaderboards,
  player progressions, virtual economies, persistent storage, cloud saves, and player
  file hosting. Developers can also access character systems, asset management, in-app
  purchasing, missions, collectibles, and Twitch Drops integration through a unified
  API surface. SDKs are available for Unity, Unreal Engine, and Godot, with basic
  integration support for GameMaker, Construct 3, and GDevelop.

  '
