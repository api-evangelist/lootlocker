  - url: graphql/lootlocker-graphql.md
    type: GraphQL
- aid: lootlocker:server-api
  name: LootLocker Server API
  description: 'The Server API is intended for trusted server-side communication between
    a developer-managed game server and the LootLocker backend. It enables secure
    operations on behalf of players from dedicated game servers or backend services,
    supporting multiplayer and competitive game architectures where client-side calls
    would be a security risk.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://ref.lootlocker.com/server-api/
  baseURL: https://api.lootlocker.io
